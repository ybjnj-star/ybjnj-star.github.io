<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>捐款网站</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    html { font-size: 100%; }

    body {
      font-size: 100%;
      background: #ffffff;
      font-family: 'Times New Roman', 'Georgia', 'Palatino', 'Charter', 'STSong', '华文宋体', 'PingFang SC', serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 2rem 1rem;
      color: #1a1a1a;
      overflow-x: hidden;
      position: relative;
    }
    body.no-scroll {
      overflow: hidden;
    }

    .splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999999;
      transition: opacity 0.8s ease, visibility 0.8s ease;
      flex-direction: column;
    }

    .splash-content {
    }

    .splash-screen.hide {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .splash-content {
      text-align: center;
      font-family: 'Georgia', 'Times New Roman', serif;
      padding: 20px;
      position: relative;
      z-index: 2;
    }

    .splash-title {
      font-size: 1.6rem;
      letter-spacing: 6px;
      color: #0a0a0a;
      margin-bottom: 30px;
      font-weight: 400;
    }

    .ring-container {
      position: relative;
      width: 130px;
      height: 130px;
      margin: 0 auto 25px;
      cursor: pointer;
      touch-action: none;
    }

    .progress-ring {
      transform: rotate(-90deg);
      width: 130px;
      height: 130px;
    }
    .ring-bg {
      fill: none;
      stroke: #e8e8e8;
      stroke-width: 4;
    }
    .ring-progress {
      fill: none;
      stroke: #0a0a0a;
      stroke-width: 4;
      stroke-linecap: round;
      stroke-dasharray: 353.43;
      stroke-dashoffset: 353.43;
      transition: stroke-dashoffset 0.05s linear;
    }

    .center-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 78px;
      height: 78px;
      border-radius: 50%;
      background: #0a0a0a;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 14px;
      letter-spacing: 1px;
      user-select: none;
      transition: transform 0.15s ease, width 0.15s ease, height 0.15s ease, background 0.3s ease;
      font-family: 'Georgia', serif;
      text-align: center;
      line-height: 1.3;
    }
    .center-btn:active {
      transform: translate(-50%, -50%) scale(0.88);
    }
    .center-btn.done {
      background: #2a2a2a;
    }

    .splash-sub {
      font-size: 0.95rem;
      color: #777;
      letter-spacing: 3px;
      font-style: italic;
      margin-top: 8px;
      font-weight: 300;
      border-top: 1px solid #eee;
      padding-top: 18px;
    }
    .splash-sub span {
      display: block;
      font-size: 0.75rem;
      color: #bbb;
      margin-top: 4px;
      letter-spacing: 1px;
    }

    .click-hint {
      position: fixed;
      color: #0a0a0a;
      font-size: 0.9rem;
      font-family: 'Georgia', 'Times New Roman', serif;
      letter-spacing: 1px;
      pointer-events: none;
      z-index: 999999999;
      background: rgba(255,255,255,0.7);
      padding: 2px 10px;
      border-radius: 20px;
      backdrop-filter: blur(2px);
      border: 1px solid #ccc;
      box-shadow: 0 2px 8px rgba(0,0,0,0.03);
      opacity: 1;
      transform: translate(-50%, -50%);
      white-space: nowrap;
      font-weight: 400;
      color: #000000;
    }

    #particle-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.5;
    }

    #ripple-grid {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 1;
      mix-blend-mode: multiply;
      opacity: 0.7;
    }

    .page-container {
      max-width: 700px;
      width: 100%;
      background: #ffffff;
      border: 1px solid #0a0a0a;
      box-shadow: 12px 12px 0 rgba(0,0,0,0.06);
      padding: 2.2rem 2rem;
      transition: filter 0.3s ease, pointer-events 0s;
      font-weight: 350;
      letter-spacing: 0.02em;
      position: relative;
      z-index: 100;
      overflow: hidden;
    }

    /* 导航UI */
    .nav-ui {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      margin-bottom: 0.5rem;
      padding: 0 0 0.2rem 0;
      border-bottom: 1px solid #eee;
      position: relative;
    }
    .nav-btn {
      background: transparent;
      border: 2px solid #0a0a0a;
      border-radius: 40px;
      padding: 0.3rem 0.9rem;
      font-size: 0.9rem;
      font-family: 'Georgia', serif;
      font-weight: 400;
      color: #0a0a0a;
      cursor: pointer;
      transition: 0.2s;
      background: white;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 4px;
      box-shadow: 2px 2px 0 rgba(0,0,0,0.04);
    }
    .nav-btn:hover {
      background: #0a0a0a;
      color: white;
    }
    .nav-btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
      stroke: currentColor;
      stroke-width: 2;
    }
    .nav-btn-left svg { stroke-width: 2.5; }
    .nav-btn-right svg { stroke-width: 2; }

    .divider {
      border: 0;
      height: 1px;
      background: #0a0a0a;
      margin: 2rem 0 1.8rem 0;
      opacity: 0.5;
    }

    .section-title {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 4px;
      font-weight: 400;
      color: #0a0a0a;
      margin-bottom: 1.2rem;
      border-left: 6px solid #0a0a0a;
      padding-left: 0.9rem;
      line-height: 1.4;
      font-family: 'Times New Roman', 'Georgia', serif;
      opacity: 0.8;
    }

    .overview-grid {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      width: 100%;
    }

    .overview-item {
      display: flex;
      align-items: baseline;
      font-size: 0.98rem;
      line-height: 1.6;
      border-bottom: 1px dotted #bbb;
      padding: 0.4rem 0;
      font-family: 'Georgia', 'Times New Roman', serif;
      cursor: default;
      transform-origin: left center;
      position: relative;
      z-index: 1;
      width: 100%;
      box-sizing: border-box;
      flex-shrink: 0;
      transition: padding 0.15s ease, margin 0.15s ease;
    }

    .bullet {
      font-weight: 400;
      margin-right: 0.7rem;
      color: #0a0a0a;
      font-size: 1.1rem;
      width: 1.2rem;
      display: inline-block;
      text-align: center;
      font-family: 'Courier New', monospace;
      opacity: 0.7;
      flex-shrink: 0;
      transition: font-size 0.15s ease;
    }

    .overview-text {
      color: #1a1a1a;
      font-weight: 350;
      word-break: break-word;
      flex: 1 1 auto;
      min-width: 0;
      transition: font-size 0.15s ease;
    }

    .highlight-note {
      background: #f0f0f0;
      color: #0a0a0a;
      font-weight: 400;
      padding: 0.1rem 0.4rem;
      border-radius: 0;
      font-style: italic;
      letter-spacing: 0.5px;
      border: 1px solid #ccc;
    }

    .price-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 1.2rem;
      margin: 1rem 0 1.5rem 0;
      width: 100%;
    }

    .price-card {
      flex: 1 1 180px;
      min-width: 120px;
      border: 2px solid #0a0a0a;
      padding: 1rem 1rem 0.9rem 1rem;
      background: white;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      box-shadow: 4px 4px 0 #e0e0e0;
      font-family: 'Georgia', 'Times New Roman', serif;
      cursor: default;
      transform-origin: center;
      position: relative;
      z-index: 1;
      box-sizing: border-box;
      transition: padding 0.15s ease, margin 0.15s ease, transform 0.15s ease;
    }

    .price-card:hover {
      box-shadow: 1px 1px 0 #aaaaaa;
      transform: translate(2px, 2px);
    }

    .price-amount {
      font-size: 2rem;
      font-weight: 400;
      letter-spacing: -0.5px;
      line-height: 1.1;
      color: #0a0a0a;
      font-family: 'Times New Roman', 'Georgia', serif;
      transition: font-size 0.15s ease;
    }

    .price-range {
      font-size: 0.75rem;
      color: #444;
      margin-top: -0.1rem;
      font-weight: 350;
      border-top: 1px dashed #333;
      padding-top: 0.4rem;
      letter-spacing: 0.3px;
      transition: font-size 0.15s ease;
    }

    .price-label {
      font-weight: 400;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #000;
      opacity: 0.8;
      font-family: 'Times New Roman', serif;
      transition: font-size 0.15s ease;
    }

    .extra-row {
      display: flex;
      gap: 1.2rem;
      flex-wrap: wrap;
      align-items: center;
      margin: 0.8rem 0 0.2rem;
      cursor: default;
      position: relative;
      z-index: 1;
      width: 100%;
      box-sizing: border-box;
      transition: padding 0.15s ease, margin 0.15s ease;
    }

    .badge {
      background: #0a0a0a;
      color: white;
      font-weight: 400;
      padding: 0.25rem 1.2rem;
      font-size: 0.85rem;
      letter-spacing: 2px;
      display: inline-block;
      border: 1px solid #0a0a0a;
      font-family: 'Georgia', serif;
      transition: font-size 0.15s ease, padding 0.15s ease;
    }

    .rule-box {
      background: #fafafa;
      border-left: 4px solid #0a0a0a;
      padding: 1rem 1.2rem;
      margin: 1.2rem 0 1rem;
      font-size: 0.92rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      color: #1e1e1e;
      font-family: 'Georgia', serif;
      width: 100%;
      box-sizing: border-box;
    }

    .rule-item {
      display: flex;
      gap: 0.4rem;
      cursor: default;
      transform-origin: left center;
      position: relative;
      z-index: 1;
      width: 100%;
      box-sizing: border-box;
      transition: padding 0.15s ease, margin 0.15s ease;
    }

    .rule-icon {
      font-weight: 400;
      margin-right: 0.3rem;
      font-family: 'Courier New', monospace;
      opacity: 0.6;
      flex-shrink: 0;
      transition: font-size 0.15s ease;
    }

    .check-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      margin-top: 0.5rem;
      width: 100%;
      box-sizing: border-box;
    }

    .check-list li {
      display: flex;
      gap: 0.6rem;
      align-items: flex-start;
      font-size: 0.95rem;
      line-height: 1.6;
      border-bottom: 1px solid #e8e8e8;
      padding: 0.7rem 0;
      font-family: 'Georgia', serif;
      cursor: default;
      transform-origin: left center;
      position: relative;
      z-index: 1;
      width: 100%;
      box-sizing: border-box;
      transition: padding 0.15s ease, margin 0.15s ease;
    }

    .check-icon {
      font-size: 1.1rem;
      font-weight: 400;
      color: #000;
      min-width: 1.4rem;
      font-family: 'Courier New', monospace;
      opacity: 0.7;
      flex-shrink: 0;
      transition: font-size 0.15s ease;
    }

    .statement {
      font-style: italic;
      background: #111;
      color: #f0f0f0;
      padding: 0.9rem 1.2rem;
      margin: 1.2rem 0;
      letter-spacing: 0.04em;
      font-weight: 300;
      border: 1px solid #000;
      font-family: 'Georgia', serif;
      font-size: 0.95rem;
      cursor: default;
      transform-origin: left center;
      position: relative;
      z-index: 1;
      width: 100%;
      box-sizing: border-box;
      transition: padding 0.15s ease, margin 0.15s ease;
    }

    .footnote {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      margin-top: 0.8rem;
      font-size: 0.88rem;
      color: #222;
      background: #f7f7f7;
      padding: 0.9rem 1rem;
      border: 1px dashed #333;
      font-family: 'Georgia', serif;
      width: 100%;
      box-sizing: border-box;
    }

    .footnote div {
      cursor: default;
      transform-origin: left center;
      position: relative;
      z-index: 1;
      width: 100%;
      box-sizing: border-box;
      transition: padding 0.15s ease, margin 0.15s ease;
    }

    .signature {
      text-align: right;
      font-weight: 400;
      letter-spacing: 1px;
      margin-top: 1.8rem;
      font-size: 0.85rem;
      text-transform: uppercase;
      color: #0a0a0a;
      border-top: 2px solid #0a0a0a;
      padding: 1.2rem 0 0 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: 'Times New Roman', serif;
      cursor: default;
      transform-origin: right center;
      position: relative;
      z-index: 1;
      width: 100%;
      box-sizing: border-box;
      transition: padding 0.15s ease, margin 0.15s ease;
    }

    button {
      background: transparent;
      border: 2px solid #0a0a0a;
      padding: 0.4rem 1.2rem;
      font-weight: 400;
      font-size: 0.8rem;
      letter-spacing: 1.5px;
      cursor: pointer;
      background: white;
      transition: 0.2s;
      text-transform: uppercase;
      font-family: 'Georgia', serif;
      flex-shrink: 0;
    }

    button:hover {
      background: #0a0a0a;
      color: white;
    }

    .satellite-time {
      text-align: center;
      font-size: 0.65rem;
      color: #999;
      letter-spacing: 1px;
      font-family: 'Georgia', 'Times New Roman', serif;
      margin-top: -0.2rem;
      margin-bottom: 0.3rem;
      font-style: italic;
      opacity: 0.7;
    }

    .animate-item {
      opacity: 0;
      transition: opacity 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94), transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .animate-item.left { transform: translateX(-30px); }
    .animate-item.right { transform: translateX(30px); }
    .animate-item.visible {
      opacity: 1;
      transform: translateX(0);
    }

    .overview-item.animate-item:nth-child(1) { transition-delay: 0.00s; }
    .overview-item.animate-item:nth-child(2) { transition-delay: 0.02s; }
    .overview-item.animate-item:nth-child(3) { transition-delay: 0.04s; }
    .overview-item.animate-item:nth-child(4) { transition-delay: 0.06s; }
    .overview-item.animate-item:nth-child(5) { transition-delay: 0.08s; }
    .overview-item.animate-item:nth-child(6) { transition-delay: 0.10s; }
    .overview-item.animate-item:nth-child(7) { transition-delay: 0.12s; }
    .overview-item.animate-item:nth-child(8) { transition-delay: 0.14s; }
    .overview-item.animate-item:nth-child(9) { transition-delay: 0.16s; }
    .check-list li.animate-item:nth-child(1) { transition-delay: 0.00s; }
    .check-list li.animate-item:nth-child(2) { transition-delay: 0.02s; }
    .check-list li.animate-item:nth-child(3) { transition-delay: 0.04s; }
    .check-list li.animate-item:nth-child(4) { transition-delay: 0.06s; }
    .check-list li.animate-item:nth-child(5) { transition-delay: 0.08s; }
    .check-list li.animate-item:nth-child(6) { transition-delay: 0.10s; }
    .check-list li.animate-item:nth-child(7) { transition-delay: 0.12s; }
    .check-list li.animate-item:nth-child(8) { transition-delay: 0.14s; }
    .check-list li.animate-item:nth-child(9) { transition-delay: 0.16s; }
    .price-card.animate-item:nth-child(1) { transition-delay: 0.00s; }
    .price-card.animate-item:nth-child(2) { transition-delay: 0.03s; }
    .price-card.animate-item:nth-child(3) { transition-delay: 0.06s; }
    .rule-item.animate-item:nth-child(1) { transition-delay: 0.00s; }
    .rule-item.animate-item:nth-child(2) { transition-delay: 0.03s; }
    .footnote div.animate-item:nth-child(1) { transition-delay: 0.00s; }
    .footnote div.animate-item:nth-child(2) { transition-delay: 0.03s; }

    @media (max-width: 600px) {
      body { padding: 0.8rem 0.5rem; }
      .page-container { padding: 1.5rem 1rem; box-shadow: 6px 6px 0 rgba(0,0,0,0.04); }
      .price-grid { flex-direction: column; gap: 0.8rem; }
      .price-card { flex: 1 1 100%; }
      .price-amount { font-size: 1.7rem; }
      .overview-item { font-size: 0.88rem; }
      .check-list li { font-size: 0.85rem; }
      .section-title { font-size: 0.75rem; letter-spacing: 3px; }
      .splash-title { font-size: 1.2rem; }
      .ring-container { width: 110px; height: 110px; }
      .progress-ring { width: 110px; height: 110px; }
      .center-btn { width: 66px; height: 66px; font-size: 12px; }
      .nav-btn { padding: 0.2rem 0.6rem; font-size: 0.75rem; }
      .nav-btn svg { width: 16px; height: 16px; }
    }
    @media (orientation: landscape) and (min-width: 600px) {
      body { padding: 0.5rem 1rem; align-items: center; }
      .page-container { max-width: 5000px; margin: 0 auto; padding: 1.2rem 2.5rem; }
      .price-grid { flex-direction: row; flex-wrap: nowrap; gap: 1rem; }
      .price-card { flex: 1 1 0; }
      .price-amount { font-size: 1.5rem; }
      .overview-item { font-size: 0.78rem; padding-bottom: 0.2rem; }
      .check-list li { font-size: 0.78rem; padding-bottom: 0.3rem; }
    }
    @media (max-width: 350px) {
      .page-container { padding: 1rem 0.7rem; border: 1px solid #0a0a0a; box-shadow: none; }
      .price-amount { font-size: 1.4rem; }
      .badge { font-size: 0.7rem; padding: 0.2rem 0.6rem; }
    }

    .page-container > * {
      max-width: 100%;
      box-sizing: border-box;
      overflow: hidden;
    }

    .click-active {
      z-index: 10 !important;
      position: relative;
    }

    .click-active .price-amount { font-size: 2.2rem !important; }
    .click-active .price-label { font-size: 1.1rem !important; }
    .click-active .price-range { font-size: 0.85rem !important; }
    .click-active .overview-text { font-size: 1.08rem !important; }
    .click-active .bullet { font-size: 1.2rem !important; }
    .click-active .check-icon { font-size: 1.2rem !important; }
    .click-active .rule-icon { font-size: 1.0rem !important; }
    .click-active .badge { font-size: 0.95rem !important; padding: 0.3rem 1.4rem !important; }
    .click-active .statement { font-size: 1.05rem !important; padding: 1.0rem 1.4rem !important; }
    .click-active .signature { font-size: 0.95rem !important; padding-top: 1.4rem !important; }
    .click-active .footnote div { font-size: 0.98rem !important; }
    .click-active .rule-item { font-size: 1.0rem !important; }
    .click-active .check-list li { font-size: 1.05rem !important; }
    .click-active .overview-item { font-size: 1.08rem !important; padding: 0.5rem 0 !important; }
    .click-active .extra-row { font-size: 1.0rem !important; }

    .squeeze .price-amount { font-size: 1.7rem !important; }
    .squeeze .price-label { font-size: 0.85rem !important; }
    .squeeze .price-range { font-size: 0.65rem !important; }
    .squeeze .overview-text { font-size: 0.88rem !important; }
    .squeeze .bullet { font-size: 0.95rem !important; }
    .squeeze .check-icon { font-size: 0.95rem !important; }
    .squeeze .rule-icon { font-size: 0.85rem !important; }
    .squeeze .badge { font-size: 0.75rem !important; padding: 0.2rem 1.0rem !important; }
    .squeeze .statement { font-size: 0.85rem !important; padding: 0.7rem 1.0rem !important; }
    .squeeze .signature { font-size: 0.75rem !important; padding-top: 1.0rem !important; }
    .squeeze .footnote div { font-size: 0.78rem !important; }
    .squeeze .rule-item { font-size: 0.82rem !important; }
    .squeeze .check-list li { font-size: 0.85rem !important; padding: 0.5rem 0 !important; }
    .squeeze .overview-item { font-size: 0.88rem !important; padding: 0.3rem 0 !important; }
    .squeeze .extra-row { font-size: 0.85rem !important; }
    .squeeze .price-card { transform: scale(0.95) !important; opacity: 0.7 !important; }
    .squeeze { opacity: 0.7 !important; transform: scale(0.96) !important; }

    .menu-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0);
      z-index: 99998;
      pointer-events: none;
      transition: background 0.5s ease;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .menu-overlay.active {
      background: rgba(0,0,0,0.4);
      pointer-events: auto;
    }

    .menu-window {
      position: fixed;
      border-radius: 0;
      background: #fff;
      border: 1px solid #0a0a0a;

      const pageContainer = document.getElementById('pageContainer');

      const CIRCUMFERENCE = 351.86;
      let holdTimer = null;
      let progress = 0;
      let isHolding = false;
      let animationId = null;
      let isDone = false;
      let hintActive = true; 

      const savedFontSize = localStorage.getItem('siteFontSize') || '100';
      document.documentElement.style.fontSize = savedFontSize + '%';
      const fontSizeSlider = document.getElementById('fontSizeSlider');
      fontSizeSlider.value = savedFontSize;

      function addHint(x, y) {
        if (!hintActive) return;
        const el = document.createElement('div');
        el.className = 'click-hint';
        el.textContent = '点中间的按钮';
        el.style.left = x + 'px';
        el.style.top = y + 'px';
        const offsetX = (Math.random() - 0.5) * 60;
        const offsetY = (Math.random() - 0.5) * 60;
        el.style.transform = `translate(calc(-50% + ${offsetX}px), calc(-50% + ${offsetY}px))`;
        hintContainer.appendChild(el);
      }

      function clearAllHints() {
        hintContainer.innerHTML = '';
      }

      function handleSplashClick(e) {
        if (!splash || splash.classList.contains('hide')) return;
        const target = e.target;
        if (target.closest('.ring-container') || target.closest('.center-btn')) return;
        const x = e.clientX || e.touches?.[0]?.clientX || 0;
        const y = e.clientY || e.touches?.[0]?.clientY || 0;
        addHint(x, y);
      }

      document.addEventListener('click', handleSplashClick);
      document.addEventListener('touchstart', handleSplashClick, { passive: true });

      function resetRing() {
        progress = 0;
        isDone = false;
        ringProgress.style.strokeDashoffset = CIRCUMFERENCE;
        centerBtn.style.width = '78px';
        centerBtn.style.height = '78px';
        centerBtn.textContent = '“要长按的……”';
        centerBtn.classList.remove('done');
      }

      function updateRing() {
        const offset = CIRCUMFERENCE - (progress / 100) * CIRCUMFERENCE;
        ringProgress.style.strokeDashoffset = offset;
        const scale = 1 - (progress / 100) * 0.3;
        const size = 78 * scale;
        centerBtn.style.width = size + 'px';
        centerBtn.style.height = size + 'px';
        if (progress > 20 && progress < 100) {
          centerBtn.textContent = Math.round(progress) + '%';
        } else if (progress >= 100) {
          centerBtn.textContent = '✓';
          centerBtn.classList.add('done');
        }
      }

      function startHold(e) {
        if (e) e.preventDefault();
        if (isHolding || isDone) return;
        isHolding = true;
        progress = 0;
        updateRing();

        const startTime = Date.now();
        const DURATION = 2200;

        function tick() {
          if (!isHolding) return;
          const elapsed = Date.now() - startTime;
          progress = Math.min(100, (elapsed / DURATION) * 100);
          updateRing();

          if (progress >= 100) {
            isDone = true;
            isHolding = false;
            setTimeout(() => {
              splash.classList.add('hide');
              hintActive = false;
              clearAllHints();
              const audioEl = document.querySelector('audio');
              if (audioEl && audioEl.paused) audioEl.play().catch(() => {});
            }, 400);
            return;
          }
          animationId = requestAnimationFrame(tick);
        }
        tick();
      }

      function endHold(e) {
        if (e) e.preventDefault();
        isHolding = false;
        if (animationId) {
          cancelAnimationFrame(animationId);
          animationId = null;
        }
        if (progress < 100 && !isDone) {
          resetRing();
        }
      }

      ringContainer.addEventListener('mousedown', startHold);
      ringContainer.addEventListener('mouseup', endHold);
      ringContainer.addEventListener('mouseleave', endHold);
      ringContainer.addEventListener('touchstart', startHold, { passive: false });
      ringContainer.addEventListener('touchend', endHold);
      ringContainer.addEventListener('touchcancel', endHold);

      const backBtn = document.getElementById('backBtn');

        const rect = menuBtn.getBoundingClientRect();

          top: rect.top,

          width: rect.width,
          height: rect.height

        menuBtn.style.opacity = '0';
        menuBtn.style.pointerEvents = 'none';

        menuWindow.style.transition = 'none';
        menuWindow.style.top = rect.top + 'px';
        menuWindow.style.left = rect.left + 'px';
        menuWindow.style.width = rect.width + 'px';

        menuWindow.style.borderRadius = '40px';
        menuWindow.style.transform = 'scale(1)';
        menuWindow.style.opacity = '0';
        menuWindow.classList.remove('expanded');

        menuWindow.offsetHeight;

        menuWindow.style.transition = 'all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)';
        menuWindow.style.opacity = '1';
        menuWindow.classList.add('expanded');

        menuOverlay.classList.add('active');
        document.body.classList.add('no-scroll');

        pageContainer.style.filter = 'blur(6px)';
        pageContainer.style.pointerEvents = 'none';
      }

      function closeMenu() {
        if (!btnRect) {
          resetMenuState();
          return;
        }

        menuWindow.classList.remove('expanded');
        menuWindow.style.transition = 'all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)';
        menuWindow.style.top = btnRect.top + 'px';
        menuWindow.style.left = btnRect.left + 'px';
        menuWindow.style.width = btnRect.width + 'px';
        menuWindow.style.height = btnRect.height + 'px';
        menuWindow.style.borderRadius = '40px';
        menuWindow.style.transform = 'scale(1)';
        menuWindow.style.opacity = '0';

        menuOverlay.classList.remove('active');
        document.body.classList.remove('no-scroll');

        pageContainer.style.filter = '';
        pageContainer.style.pointerEvents = '';

        const onTransitionEnd = function(e) {
          if (e.target !== menuWindow) return;
          menuWindow.removeEventListener('transitionend', onTransitionEnd);
          resetMenuState();
        };
        menuWindow.addEventListener('transitionend', onTransitionEnd);

        setTimeout(() => {
          if (!menuWindow.classList.contains('expanded') && menuWindow.style.opacity === '0') {
            menuWindow.removeEventListener('transitionend', onTransitionEnd);
            resetMenuState();
          }
        }, 600);
      }

      function resetMenuState() {
        menuWindow.style.transition = 'none';
        menuWindow.style.top = '50%';
        menuWindow.style.left = '50%';
        menuWindow.style.width = '';
        menuWindow.style.height = '';
        menuWindow.style.borderRadius = '';
        menuWindow.style.transform = 'translate(-50%, -50%) scale(0.7)';
        menuWindow.style.opacity = '0';
        menuWindow.classList.remove('expanded');

        menuBtn.style.opacity = '1';
        menuBtn.style.pointerEvents = 'auto';
        btnRect = null;

      function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        document.body.appendChild(toast);
        requestAnimationFrame(() => {
          toast.style.opacity = '1';
        });
        setTimeout(() => {
          toast.style.opacity = '0';
          toast.addEventListener('transitionend', () => toast.remove());
          setTimeout(() => { if (toast.parentNode) toast.remove(); }, 400);

      const fontSizeConfirm = document.getElementById('fontSizeConfirm');

        '不细分挂机、闲聊等业务，其他需求需详细说明。',
        '完全欢迎不点单只是私信闲聊。',
        '不属于任何团陪/平台陪，风格有明显区别；习惯团培玩法请谨慎下单。',
        '先玩后付，结束后觉得不值可退1-2元。',
        '单主可对外分享单内内容，但需将除建模外的个人信息打码。',
        '装扮不多，但有武士裤。默认萌新装接到单。'
      ];

      const footnoteData = [
        '<span style="font-weight:400; letter-spacing:1px;">◇ 碎碎念：</span>发现我主要靠内推，点我的不多，结束后要是喜欢我可以推荐给你的朋友！',
        '<span style="font-weight:400; letter-spacing:1px;">◇ 下单前：</span>私信告知雷点、需要我完成和注意的、留好友码。'
      ];

      function renderOverview() {
        const grid = document.getElementById('overviewGrid');
        grid.innerHTML = overviewData.map((item, i) => {
          const direction = i % 2 === 0 ? 'left' : 'right';
          const borderStyle = item.border === false ? 'border-bottom: none;' : '';
          return `<div class="overview-item animate-item ${direction}" style="${borderStyle}"><span class="bullet">※</span><span class="overview-text">${item.text}</span></div>`;
        }).join('');
      }

      function renderPrices() {
        const grid = document.getElementById('priceGrid');
        grid.innerHTML = priceData.map((p, i) => {
          const direction = i === 1 ? 'right' : 'left';
          return `<div class="price-card animate-item ${direction}"><span class="price-label">${p.label}</span><span class="price-amount">${p.amount}</span><div class="price-range">${p.range}</div></div>`;
        }).join('');
      }

      function renderExtra() {
        const row = document.getElementById('extraRow');
        row.innerHTML = `<div class="badge">月卡 19r</div><span style="font-size:0.8rem; color:#444; font-style:italic; letter-spacing:0.5px;">————每日首单减1r</span>`;
      }

      function renderRules() {
        const box = document.getElementById('ruleBox');
        box.innerHTML = ruleData.map((r, i) => {
          const direction = i === 0 ? 'right' : 'left';
          return `<div class="rule-item animate-item ${direction}"><span class="rule-icon">◆</span> ${r.text}</div>`;
        }).join('');
      }

      function renderChecks() {
        const list = document.getElementById('checkList');
        list.innerHTML = checkData.map((text, i) => {
          const direction = i % 2 === 0 ? 'right' : 'left';
          const border = i === checkData.length - 1 ? 'border-bottom: none;' : '';
          return `<li class="animate-item ${direction}" style="${border}"><span class="check-icon">☑</span>${text}</li>`;
        }).join('');
      }

      function renderFootnote() {
        const fn = document.getElementById('footnote');
        fn.innerHTML = footnoteData.map((html, i) => {
          const direction = i === 0 ? 'right' : 'left';
          return `<div class="animate-item ${direction}">${html}</div>`;
        }).join('');
      }

      renderOverview();
      renderPrices();
      renderExtra();
      renderRules();
      renderChecks();
      renderFootnote();

      document.addEventListener('selectstart', e => e.preventDefault());
      document.addEventListener('contextmenu', e => e.preventDefault());

      const CLICKABLE_SELECTOR = '.overview-item, .price-card, .rule-item, .check-list li, .statement, .footnote div, .signature, .extra-row';
      let activeEl = null;
      let clearTimer = null;

      function getSiblings(el) {
        const parent = el.parentElement;
        if (!parent) return [];
        return Array.from(parent.children).filter(child => child !== el && child.matches(CLICKABLE_SELECTOR));
      }

      function getCardSiblings(el) {
        const grid = el.closest('.price-grid');
        if (!grid) return [];
        return Array.from(grid.children).filter(child => child !== el && child.classList.contains('price-card'));
      }

      function clearAllEffects() {
        document.querySelectorAll('.click-active, .squeeze').forEach(el => {
          el.classList.remove('click-active', 'squeeze');
          el.style.transform = '';
          el.style.opacity = '';
          el.style.zIndex = '';
        });
      }

      function applyEffects(target) {
        clearAllEffects();
        activeEl = target;
        target.classList.add('click-active');
        target.style.zIndex = '10';

        const siblings = target.classList.contains('price-card') ? getCardSiblings(target) : getSiblings(target);
        siblings.forEach(sib => {
          sib.classList.add('squeeze');
          sib.style.transform = 'scale(0.96)';
          sib.style.opacity = '0.7';
        });
      }

      function handlePointerDown(e) {
        const x = e.touches ? e.touches[0].clientX : e.clientX;
        const y = e.touches ? e.touches[0].clientY : e.clientY;
        const elements = document.querySelectorAll(CLICKABLE_SELECTOR);
        let target = null;
        for (const el of elements) {
          const rect = el.getBoundingClientRect();
          if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
            target = el;
            break;
          }
        }
        if (!target) return;
        if (clearTimer) { clearTimeout(clearTimer); clearTimer = null; }
        applyEffects(target);
      }

      function handlePointerUp() {
        if (!activeEl) return;
        if (clearTimer) clearTimeout(clearTimer);
        clearTimer = setTimeout(() => {
          clearAllEffects();
          activeEl = null;
          clearTimer = null;
        }, 400);
      }

      function handlePointerLeave() {
        if (activeEl) {
          if (clearTimer) clearTimeout(clearTimer);
          clearAllEffects();
          activeEl = null;
          clearTimer = null;
        }
      }

      document.addEventListener('mousedown', handlePointerDown);
      document.addEventListener('mouseup', handlePointerUp);
      document.addEventListener('mouseleave', handlePointerLeave);
      document.addEventListener('touchstart', handlePointerDown, { passive: true });
      document.addEventListener('touchend', handlePointerUp);
      document.addEventListener('touchcancel', handlePointerUp);

      document.querySelectorAll('button, a').forEach(el => {
        el.addEventListener('mousedown', e => e.stopPropagation());
        el.addEventListener('touchstart', e => e.stopPropagation());
      });

      const rippleCanvas = document.getElementById('ripple-grid');
      const ctxRipple = rippleCanvas.getContext('2d');
      let width, height;
      const fadeSpeed = 0.006;
      const maxRadius = 180;
      const gridSize = 26;
      let touches = [];
      let lastX = null, lastY = null, lastTime = null;
      const offscreen = document.createElement('canvas');
      const offCtx = offscreen.getContext('2d');

      function resizeRipple() {
        width = rippleCanvas.width = window.innerWidth;
        height = rippleCanvas.height = window.innerHeight;
        buildGrid();
      }

      function buildGrid() {
        offscreen.width = width;
        offscreen.height = height;
        offCtx.fillStyle = '#faf8f5';
        offCtx.fillRect(0, 0, width, height);
        offCtx.fillStyle = '#ffffff';
        for (let x = 0; x < width; x += gridSize) {
          for (let y = 0; y < height; y += gridSize) {
            if ((Math.floor(x / gridSize) + Math.floor(y / gridSize)) % 2 === 0) {
              offCtx.fillRect(x, y, gridSize, gridSize);
            }
          }
        }
      }

      window.addEventListener('resize', resizeRipple);
      resizeRipple();

      class TouchPoint {
        constructor(x, y, speed) {
          this.x = x;
          this.y = y;
          this.life = 1;
          this.speed = speed;
          this.radius = 30 + speed * 30;
        }
        update() {
          this.life -= fadeSpeed * (0.8 + this.speed * 0.4);
          this.radius += (1 + this.speed) * 1.2;
          if (this.radius > maxRadius) this.radius = maxRadius;
        }
      }

      function animateRipple() {
        ctxRipple.clearRect(0, 0, width, height);
        touches.forEach(t => {
          t.update();
          if (t.life <= 0) return;
          const r = t.radius;
          ctxRipple.save();
          ctxRipple.beginPath();
          ctxRipple.arc(t.x, t.y, r, 0, Math.PI * 2);
          ctxRipple.clip();
          ctxRipple.drawImage(offscreen, 0, 0);
          const gradInner = ctxRipple.createRadialGradient(t.x, t.y, r * 0.08, t.x, t.y, r * 0.5);
          gradInner.addColorStop(0, `rgba(255,255,255,${t.life * 0.15})`);
          gradInner.addColorStop(0.5, `rgba(255,255,255,${t.life * 0.35})`);
          gradInner.addColorStop(1, `rgba(255,255,255,${t.life * 0.6})`);
          ctxRipple.fillStyle = gradInner;
          ctxRipple.fillRect(t.x - r, t.y - r, r * 2, r * 2);
          const gradOuter = ctxRipple.createRadialGradient(t.x, t.y, r * 0.5, t.x, t.y, r);
          gradOuter.addColorStop(0, `rgba(255,255,255,${t.life * 0.5})`);
          gradOuter.addColorStop(0.6, `rgba(255,255,255,${t.life * 0.2})`);
          gradOuter.addColorStop(1, 'rgba(255,255,255,0)');
          ctxRipple.fillStyle = gradOuter;
          ctxRipple.fillRect(t.x - r, t.y - r, r * 2, r * 2);
          ctxRipple.restore();
        });
        touches = touches.filter(t => t.life > 0.001);
        requestAnimationFrame(animateRipple);
      }
      animateRipple();

      function addTouchPoint(e) {
        const x = e.touches ? e.touches[0].clientX : e.clientX;
        const y = e.touches ? e.touches[0].clientY : e.clientY;
        const now = performance.now();
        let speed = 1;
        if (lastX !== null && lastY !== null && lastTime !== null) {
          const dx = x - lastX, dy = y - lastY;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const dt = now - lastTime;
          if (dt > 0 && dt < 200) speed = Math.min(5, Math.max(0.5, dist / dt * 8));
        }
        lastX = x; lastY = y; lastTime = now;
        if (!touches.some(t => Math.hypot(t.x - x, t.y - y) < 15)) {
          touches.push(new TouchPoint(x, y, speed));
          if (touches.length > 20) touches.shift();
        }
      }
      window.addEventListener('mousemove', addTouchPoint, { passive: true });
      window.addEventListener('touchmove', addTouchPoint, { passive: true });
      window.addEventListener('touchstart', addTouchPoint, { passive: true });

      const particleCanvas = document.getElementById('particle-canvas');
      const ctxParticle = particleCanvas.getContext('2d');
      let w, h;
      const MAX_PARTICLES = 160;
      const particles = [];

      function resizeParticle() {
        w = particleCanvas.width = window.innerWidth;
        h = particleCanvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resizeParticle);
      resizeParticle();

      class Particle {
        constructor() {
          this.reset();
          this.y = Math.random() * h;
          this.x = Math.random() * w;
        }
        reset() {
          this.x = Math.random() * w;
          this.y = -10 - Math.random() * 20;
          this.size = 2 + Math.random() * 5;
          this.speed = 0.3 + Math.random() * 0.8;
          this.opacity = 0.15 + Math.random() * 0.35;
          this.wind = (Math.random() - 0.5) * 0.4;
        }
        update() {
          this.y += this.speed;
          this.x += this.wind + Math.sin(this.y * 0.01) * 0.1;
          if (this.y > h + 20) { this.reset(); this.y = -10 - Math.random() * 20; }
          if (this.x < -20) this.x = w + 20;
          if (this.x > w + 20) this.x = -20;
        }
        draw() {
          ctxParticle.beginPath();
          ctxParticle.arc(this.x, this.y, this.size * 0.6, 0, Math.PI * 2);
          ctxParticle.fillStyle = `rgba(180, 180, 185, ${this.opacity})`;
          ctxParticle.shadowColor = 'rgba(180,180,185,0.1)';
          ctxParticle.shadowBlur = 6;
          ctxParticle.fill();
          ctxParticle.shadowBlur = 0;
        }
      }

      for (let i = 0; i < MAX_PARTICLES; i++) particles.push(new Particle());

      function drawParticles() {
        ctxParticle.clearRect(0, 0, w, h);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(drawParticles);
      }
      drawParticles();

      const audio = new Audio();
      audio.src = 'alex-morgan-chill-545522.mp3';
      audio.loop = true;
      audio.volume = 0.4;

      function tryAutoPlay() {
        audio.play().catch(() => {
          const playOnce = () => { audio.play().catch(() => {}); document.removeEventListener('click', playOnce); };
          document.addEventListener('click', playOnce, { once: true });
        });
      }
      window.addEventListener('load', tryAutoPlay);
      document.querySelector('.page-container').addEventListener('click', () => {
        if (audio.paused) audio.play().catch(() => {});
      }, { passive: true });

      function updateSatTime() {
        const now = new Date();
        const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
        document.getElementById('sat-time').textContent = `设备时间 ${timeStr} · 同步中`;
      }
      updateSatTime();
      setInterval(updateSatTime, 1000);

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          entry.target.classList.toggle('visible', entry.isIntersecting);
        });
      }, { threshold: 0.15 });

      document.querySelectorAll('.animate-item').forEach(item => observer.observe(item));

    })();
  </script>
</body>
</html>
